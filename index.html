<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    input,select,textarea{-webkit-appearance:none;font-family:'DM Sans',sans-serif}
    ::-webkit-scrollbar{display:none}
    input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes toastIn{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
    .card{background:#1E293B;border-radius:16px;border:1px solid #334155}
    .inp{width:100%;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:12px 14px;color:#E2E8F0;font-size:14px;outline:none}
    .lbl{font-size:12px;font-weight:600;color:#64748B;letter-spacing:.08em;display:block;margin-bottom:6px}
    .fld{margin-bottom:14px}
    .btnP{background:linear-gradient(135deg,#3B82F6,#6366F1);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;padding:15px;width:100%}
    .btnD{background:transparent;border:1px solid #EF4444;border-radius:14px;color:#EF4444;font-size:14px;font-weight:600;cursor:pointer;padding:13px;width:100%;margin-top:10px}

    .sh{background:#1E293B;border-radius:24px 24px 0 0;padding:24px 20px 40px;max-height:85dvh;display:flex;flex-direction:column}
    .hdl{width:40px;height:4px;background:#334155;border-radius:2px;margin:0 auto 16px}
    .pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600}
    .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace}
    .mono{font-family:'DM Mono',monospace}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;animation:toastIn .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
var SK_MSGS = "entregas_msgs";
var DEFAULT_MSGS = [
  "Estoy llegando",
  "Salgo para alla",
  "Pedido entregado",
  "Llego en 10 minutos",
  "Manana te lo llevo"
];
function loadMsgs(){try{return JSON.parse(localStorage.getItem(SK_MSGS)||"null")||DEFAULT_MSGS;}catch(e){return DEFAULT_MSGS;}}
function saveMsgs(m){localStorage.setItem(SK_MSGS,JSON.stringify(m));}
var ESTADOS=["Pendiente","En camino","Entregado","Fallido"];
var EC={"Pendiente":{color:"#F59E0B",bg:"#FEF3C7",dot:"#F59E0B"},"En camino":{color:"#3B82F6",bg:"#DBEAFE",dot:"#3B82F6"},"Entregado":{color:"#10B981",bg:"#D1FAE5",dot:"#10B981"},"Fallido":{color:"#EF4444",bg:"#FEE2E2",dot:"#EF4444"}};
var DRIVE_ID="1sRRC-CmIwVXjsliRWCMM0bcnEgC_hmF-";
var SK_API="anthropic_api_key";
var SK_DATA="entregas_v3";
var RAILWAY="https://entregas-servidor-production.up.railway.app";

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function eur(n){return (parseFloat(n)||0).toFixed(2)+" EUR";}
function tot(ps){return (ps||[]).reduce(function(s,p){return s+(parseFloat(p.precio)||0)*(parseInt(p.cantidad)||0);},0);}
function fmt(iso){if(!iso)return "";var d=new Date(iso);return d.toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});}
function lload(){try{var keys=[SK_DATA,"entregas_data_v3","entregas_data_v2","entregas_v2"];for(var i=0;i<keys.length;i++){var d=JSON.parse(localStorage.getItem(keys[i])||"{}");if(d&&(d.entregas||d.clientes||d.productos)){if(i>0)localStorage.setItem(SK_DATA,JSON.stringify(d));return d;}}return {};}catch(e){return {};}}
function lsave(d){localStorage.setItem(SK_DATA,JSON.stringify(d));}

function callRailway(key,sys,usr,mcp){
  var body={system:sys,user:usr};
  if(mcp) body.mcp=mcp;
  return fetch(RAILWAY+"/api/claude",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key},body:JSON.stringify(body)}).then(function(r){return r.json();});
}
function driveLoad(key){
  return callRailway(key,
    'Lee el archivo de Google Drive con ID "'+DRIVE_ID+'". Devuelve SOLO el contenido JSON del archivo sin ningun texto adicional, sin backticks, sin explicaciones. Si el archivo esta vacio o contiene [] devuelve {}.',
    'Lee el contenido completo del archivo Google Drive ID: '+DRIVE_ID,
    [{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"gdrive"}]
  ).then(function(d){
    var txt=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").trim();
    var clean=txt.replace(/```json|```/g,"").trim();
    if(!clean||clean==="[]"||clean==="null") return {};
    return JSON.parse(clean);
  });
}
function driveSave(key,data){
  var json=JSON.stringify(data);
  return callRailway(key,
    'Actualiza el archivo de Google Drive con ID "'+DRIVE_ID+'" con el siguiente contenido JSON. Usa la herramienta de Drive para sobrescribir el archivo con exactamente ese contenido. Confirma con "ok" cuando termine.',
    'Contenido a guardar en Drive ID '+DRIVE_ID+':\n'+json,
    [{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"gdrive"}]
  );
}

var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;

function Badge(p){var c=EC[p.estado]||EC["Pendiente"];return h("span",{className:"tag",style:{background:c.bg,color:c.color}},h("span",{style:{width:6,height:6,borderRadius:"50%",background:c.dot}}),p.estado.toUpperCase());}

  function onSave(){
    if(!form[props.fields[0].key].trim())return;
    if(eid)props.onSave(props.items.map(function(i){return i.id===eid?Object.assign({},form,{id:eid}):i;}));
    else props.onSave(props.items.concat([Object.assign({},form,{id:gid()})]));
    setForm(null);
  }
  return h("div",{className:"ov"},h("div",{className:"sh"},
    h("div",{className:"hdl"}),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      h("div",{style:{fontSize:18,fontWeight:700,color:"#F1F5F9"}},form===null?props.title:(eid?"Editar":"Nuevo")),
      h("div",{style:{display:"flex",gap:8}},
        form!==null&&h("button",{onClick:function(){setForm(null);},style:{background:"#334155",border:"none",color:"#94A3B8",width:32,height:32,borderRadius:10,cursor:"pointer",fontSize:14}},"<"),
        h("button",{onClick:props.onClose,style:{background:"#334155",border:"none",color:"#94A3B8",width:32,height:32,borderRadius:10,cursor:"pointer",fontSize:16}},"X")
      )

      h("div",{style:{flex:1,overflowY:"auto"}},
        props.items.length===0&&h("div",{style:{textAlign:"center",color:"#475569",marginTop:40,fontSize:14}},"No hay elementos aun"),
        props.items.map(function(item){
          return h("div",{key:item.id,style:{background:"#0F172A",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #334155",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null,
              h("div",{style:{fontWeight:600,color:"#F1F5F9",fontSize:14}},item[props.fields[0].key]),
              props.fields.slice(1).map(function(f){return h("div",{key:f.key,style:{fontSize:12,color:"#64748B",marginTop:2}},f.label+": "+(f.key==="precio"?eur(item[f.key]):(item[f.key]||"-")));})
            ),
            h("div",{style:{display:"flex",gap:6}},
              h("button",{onClick:function(){onEdit(item);},style:{background:"#1E293B",border:"1px solid #334155",color:"#94A3B8",width:32,height:32,borderRadius:8,cursor:"pointer"}},"E"),
              h("button",{onClick:function(){props.onDelete(item.id);},style:{background:"#1E293B",border:"1px solid #EF4444",color:"#EF4444",width:32,height:32,borderRadius:8,cursor:"pointer"}},"X")
            )
          );
        }),
        h("button",{className:"btnP",style:{marginTop:8},onClick:onNew},"+ Anadir")
      ):
      h("div",{style:{flex:1,overflowY:"auto"}},
        props.fields.map(function(f){return h("div",{key:f.key,className:"fld"},h("span",{className:"lbl"},f.label.toUpperCase()),h("input",{type:f.type||"text",value:form[f.key]||"",placeholder:f.placeholder||f.label,className:"inp",onChange:function(e){var v=e.target.value;setForm(function(x){var n=Object.assign({},x);n[f.key]=v;return n;});}}));}),
        eid&&h("button",{className:"btnD",onClick:function(){props.onDelete(eid);setForm(null);}},"Eliminar"),
        h("button",{className:"btnP",onClick:onSave},"Guardar")
      )
  ));
}

function CPicker(props){
  var sq=useState("");var q=sq[0],setQ=sq[1];
  var fil=props.clientes.filter(function(c){return c.nombre.toLowerCase().indexOf(q.toLowerCase())>=0||(c.telefono||"").indexOf(q)>=0;});
  return h("div",{className:"ov",style:{zIndex:950}},h("div",{className:"sh",style:{maxHeight:"70dvh"}},
    h("div",{className:"hdl"}),
    h("div",{style:{display:"flex",gap:8,marginBottom:12}},
      h("input",{value:q,onChange:function(e){setQ(e.target.value);},placeholder:"Buscar cliente...",className:"inp",style:{flex:1,background:"#0F172A",padding:"10px 14px"}}),
      h("button",{onClick:props.onClose,style:{background:"#334155",border:"none",color:"#94A3B8",width:36,height:36,borderRadius:10,cursor:"pointer",flexShrink:0}},"X")
    ),
    h("div",{style:{flex:1,overflowY:"auto"}},
      fil.map(function(c){return h("div",{key:c.id,onClick:function(){props.onSelect(c);props.onClose();},style:{background:"#0F172A",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #334155",cursor:"pointer"}},
        h("div",{style:{fontSize:14,color:"#F1F5F9",fontWeight:600}},c.nombre),
        c.telefono&&h("div",{style:{fontSize:12,color:"#64748B",marginTop:2}},"Tel: "+c.telefono),
        c.direccion&&h("div",{style:{fontSize:12,color:"#64748B",marginTop:1}},"Dir: "+c.direccion)
      );})
    )
  ));
}

function PPicker(props){
  var sq=useState("");var q=sq[0],setQ=sq[1];
  var fil=props.productos.filter(function(p){return p.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});
  return h("div",{className:"ov",style:{zIndex:950}},h("div",{className:"sh",style:{maxHeight:"70dvh"}},
    h("div",{className:"hdl"}),
    h("div",{style:{display:"flex",gap:8,marginBottom:12}},
      h("input",{value:q,onChange:function(e){setQ(e.target.value);},placeholder:"Buscar producto...",className:"inp",style:{flex:1,background:"#0F172A",padding:"10px 14px"}}),
      h("button",{onClick:props.onClose,style:{background:"#334155",border:"none",color:"#94A3B8",width:36,height:36,borderRadius:10,cursor:"pointer",flexShrink:0}},"X")
    ),
    h("div",{style:{flex:1,overflowY:"auto"}},
      fil.map(function(p){return h("div",{key:p.id,onClick:function(){props.onAdd(p);props.onClose();},style:{background:"#0F172A",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #334155",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{fontSize:14,color:"#F1F5F9",fontWeight:500}},p.nombre),
        h("span",{className:"mono",style:{fontSize:13,color:"#3B82F6",fontWeight:700}},eur(p.precio))
      );})
    )
  ));
}

function IAModal(props){
  var si=useState("");var inp=si[0],setInp=si[1];
  var sl=useState(false);var load=sl[0],setLoad=sl[1];
  var sr=useState("");var resp=sr[0],setResp=sr[1];
  function exec(){if(!inp.trim())return;setLoad(true);setResp("");props.onCmd(inp,function(r){setResp(r);setLoad(false);});}
  return h("div",{className:"ov",style:{zIndex:950}},h("div",{className:"sh"},
    h("div",{className:"hdl"}),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("div",null,h("div",{style:{fontSize:18,fontWeight:700,color:"#F1F5F9"}},"Asistente IA"),h("div",{style:{fontSize:12,color:"#64748B",marginTop:2}},"Escribe o dicta tu instruccion")),
      h("button",{onClick:props.onClose,style:{background:"#334155",border:"none",color:"#94A3B8",width:32,height:32,borderRadius:10,cursor:"pointer",fontSize:16}},"X")
    ),
    h("div",{style:{background:"#0F172A",borderRadius:10,padding:"10px 14px",marginBottom:10,border:"1px solid #6366F144",fontSize:12,color:"#94A3B8",lineHeight:1.6}},'"Nueva entrega para Luis, 10 tubitos" | "Cambia entrega de Maria a entregado" | "Manda WhatsApp a Raul que su pedido esta en camino"'),
    h("textarea",{value:inp,onChange:function(e){setInp(e.target.value);},placeholder:"Escribe tu instruccion aqui...",style:{width:"100%",minHeight:90,background:"#0F172A",border:"1px solid #334155",borderRadius:12,padding:"12px",color:"#E2E8F0",fontSize:14,outline:"none",resize:"none",marginBottom:10}}),
    resp&&h("div",{style:{background:"#0F172A",borderRadius:10,padding:"10px",marginBottom:10,border:"1px solid #10B98144",fontSize:13,color:"#10B981"}},resp),
    h("button",{disabled:load,onClick:exec,className:"btnP",style:{background:load?"#334155":"linear-gradient(135deg,#6366F1,#4F46E5)"}},load?"Procesando...":"Ejecutar")
  ));
}

function SetModal(props){
  var sk=useState("");var tmpk=sk[0],setTmpk=sk[1];
  var sm=useState(props.msgs.join("\n"));var tmpMsgs=sm[0],setTmpMsgs=sm[1];
  var st=useState("key");var tab=st[0],setTab=st[1];
  return h("div",{className:"ov"},h("div",{className:"sh"},
    h("div",{className:"hdl"}),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      h("div",{style:{fontSize:18,fontWeight:700,color:"#F1F5F9"}},"Ajustes"),
      h("button",{onClick:props.onClose,style:{background:"#334155",border:"none",color:"#94A3B8",width:32,height:32,borderRadius:10,cursor:"pointer",fontSize:16}},"X")
    ),
    h("div",{style:{display:"flex",gap:6,marginBottom:16}},
      h("button",{onClick:function(){setTab("key");},style:{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab==="key"?"#3B82F6":"#1E293B",color:tab==="key"?"#fff":"#64748B"}},"API Key"),
      h("button",{onClick:function(){setTab("msgs");},style:{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab==="msgs"?"#3B82F6":"#1E293B",color:tab==="msgs"?"#fff":"#64748B"}},"Mensajes rapidos")
    ),
    tab==="key"&&h("div",null,
      h("span",{className:"lbl"},"CLAVE API ANTHROPIC"),
      h("div",{style:{fontSize:12,color:props.hasKey?"#10B981":"#EF4444",marginBottom:8}},props.hasKey?"Conectado":"Sin clave - solo almacenamiento local"),
      h("input",{type:"password",value:tmpk,onChange:function(e){setTmpk(e.target.value);},placeholder:"sk-ant-...",className:"inp",style:{marginBottom:12}}),
      h("button",{className:"btnP",onClick:function(){
        if(tmpk.startsWith("sk-")){localStorage.setItem(SK_API,tmpk);props.onSave(tmpk);setTmpk("");}
        else props.showMsg("La clave debe empezar por sk-","err");
      }},"Guardar clave"),
      props.hasKey&&h("button",{className:"btnD",onClick:function(){
        if(confirm("Quitar clave?")){localStorage.removeItem(SK_API);props.onSave("");}
      }},"Quitar clave")
    ),
    tab==="msgs"&&h("div",null,
      h("span",{className:"lbl"},"MENSAJES RAPIDOS DE WHATSAPP"),
      h("div",{style:{fontSize:12,color:"#64748B",marginBottom:8,lineHeight:1.5}},"Un mensaje por linea. Se mostraran como botones rapidos en el detalle de cada entrega."),
      h("textarea",{value:tmpMsgs,onChange:function(e){setTmpMsgs(e.target.value);},style:{width:"100%",minHeight:160,background:"#0F172A",border:"1px solid #334155",borderRadius:12,padding:"12px",color:"#E2E8F0",fontSize:14,outline:"none",resize:"none",marginBottom:12}}),
      h("button",{className:"btnP",onClick:function(){
        var list=tmpMsgs.split("\n").map(function(m){return m.trim();}).filter(function(m){return m.length>0;});
        saveMsgs(list);props.onSaveMsgs(list);props.showMsg("Mensajes guardados");
      }},"Guardar mensajes"),
      h("button",{onClick:function(){var d=DEFAULT_MSGS.join("\n");setTmpMsgs(d);},style:{width:"100%",padding:"10px",background:"transparent",border:"1px solid #334155",borderRadius:12,color:"#64748B",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}},"Restaurar predeterminados")
    )
  ));
}

function App(){
  var s0=useState(function(){return localStorage.getItem(SK_API)||"";});
  var apiKey=s0[0],setApiKey=s0[1];
  var s1=useState(function(){var d=lload();return {entregas:d.entregas||[],clientes:d.clientes||[],productos:d.productos||[]};});
  var data=s1[0],setData=s1[1];
  var s2=useState("list");var view=s2[0],setView=s2[1];
  var s3=useState(null);var sel=s3[0],setSel=s3[1];
  var s4=useState(null);var eid=s4[0],setEid=s4[1];
  var s5=useState(null);var form=s5[0],setForm=s5[1];
  var s6=useState("Todos");var filt=s6[0],setFilt=s6[1];
  var s7=useState("");var busq=s7[0],setBusq=s7[1];
  var s8=useState(null);var toast=s8[0],setToast=s8[1];
  var s9=useState(false);var showImp=s9[0],setShowImp=s9[1];
  var s10=useState(false);var showCP=s10[0],setShowCP=s10[1];
  var s11=useState(false);var showPP=s11[0],setShowPP=s11[1];
  var s12=useState(false);var showCC=s12[0],setShowCC=s12[1];
  var s13=useState(false);var showPC=s13[0],setShowPC=s13[1];
  var s14=useState("idle");var sync=s14[0],setSync=s14[1];
  var s15=useState(false);var showSet=s15[0],setShowSet=s15[1];
  var s16=useState(false);var showIA=s16[0],setShowIA=s16[1];
  var s17=useState(function(){return loadMsgs();});var msgs=s17[0],setMsgs=s17[1];
  var tRef=useRef(null);
  var sRef=useRef(null);
  var first=useRef(true);

  var EF={cliente:"",telefono:"",direccion:"",fecha:new Date().toISOString().slice(0,16),estado:"Pendiente",productos:[{nombre:"",cantidad:1,precio:0}],pagado:0,formaPago:"Pendiente",esMensajeria:false,mensajeriaEmpresa:"",mensajeriaSeguimiento:"",mensajeriaCoste:0,mensajeriaDireccion:""};

  // Load from Drive on mount
  useEffect(function(){
    if(!apiKey){setSync("local");return;}
    setSync("syncing");
    driveLoad(apiKey).then(function(d){
      if(d&&(d.entregas||d.clientes||d.productos)){
        var m={entregas:d.entregas||[],clientes:d.clientes||[],productos:d.productos||[]};
        setData(m);lsave(m);
      }
      setSync("ok");
    }).catch(function(){setSync("error");});
  },[apiKey]);

  // Save on data change
  useEffect(function(){
    if(first.current){first.current=false;return;}
    lsave(data);
    if(!apiKey){setSync("local");return;}
    clearTimeout(sRef.current);
    setSync("syncing");
    sRef.current=setTimeout(function(){
      driveSave(apiKey,data).then(function(){setSync("ok");}).catch(function(){setSync("error");});
    },3000);
  },[data]);

  function msg(m,t){setToast({m:m,t:t||"ok"});clearTimeout(tRef.current);tRef.current=setTimeout(function(){setToast(null);},2500);}
  function upd(k,fn){setData(function(d){var n=Object.assign({},d);n[k]=fn(d[k]);return n;});}

  function forceDriveLoad(){
    if(!apiKey){msg("Configura tu clave API primero","err");return;}
    setSync("syncing");
    driveLoad(apiKey).then(function(d){
      if(d&&(d.entregas||d.clientes||d.productos)){
        var m={entregas:d.entregas||[],clientes:d.clientes||[],productos:d.productos||[]};
        setData(m);lsave(m);
      }
      setSync("ok");
      msg("Datos recargados");
